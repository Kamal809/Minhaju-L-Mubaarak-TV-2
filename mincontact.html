<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f8f9fb;
    color:#333;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#0d1b2a;
    color:#fff;
    position:sticky;
    top:0;
}

nav a{
    margin-left:20px;
    color:#fff;
    text-decoration:none;
}
nav a:hover{
    color:#e63946;
}

.book-btn{
    margin-left:20px;
    padding:8px 18px;
    background:#e63946;
    border:none;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}
.book-btn:hover{
    background:#c1121f;
}

/* CONTACT SECTION */
.contact{
    display:flex;
    padding:60px 40px;
    gap:30px;
    flex-wrap:wrap;
}

/* LEFT IMAGE */
.contact img{
    width:450px;
    border-radius:10px;
}

/* FORM */
.form-box{
    flex:1;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.form-box h2{
    margin-bottom:15px;
}

.form-box input,
.form-box select,
.form-box textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

.form-box button{
    padding:12px;
    border:none;
    background:#e63946;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

.form-box button:hover{
    background:#c1121f;
}

/* INFO SECTION */
.info{
    padding:40px;
    text-align:center;
}

.map{
    margin:20px 0;
}

/* SOCIAL */
.social{
    margin-top:20px;
}

.social a{
    margin:10px;
    text-decoration:none;
    color:#e63946;
    font-weight:600;
}

/* WHATSAPP QR */
.qr{
    margin-top:30px;
}

/* CTA */
.cta{
    padding:60px 40px;
    text-align:center;
    background:#0d1b2a;
    color:#fff;
}

.cta button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    background:#e63946;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

.cta button:hover{
    background:#c1121f;
}

/* FOOTER */
footer{
    background:#000814;
    color:#fff;
    text-align:center;
    padding:20px;
}
/* HAMBURGER ICON */
.menu-icon{
    display:none;
    font-size:28px;
    cursor:pointer;
}

/* HIDE CHECKBOX */
#menu-toggle{
    display:none;
}

/* RESPONSIVE */
@media(max-width:768px){
    .contact{
        flex-direction:column;
        text-align:center;
    }

    .contact img{
        width:100%;
    }
    nav{
        display: block;
        font-size: 10px;
    }
    .book-btn{
        font-size: 10px;
        margin-left: 200px;
    }
    header h1 {
        line-height: 0.9;
    }
    iframe {
        width: 450px;
        height: 350px;
    }
    
     /* WHEN CLICKED (OPEN MENU) */
    #menu-toggle:checked ~ .nav-menu{
        max-height:400px;
    }
}
</style>
</head>

<script src="fetch-images.js"></script>
    <script>
        const form = document.getElementById('form');
const submitBtn = form.querySelector('button[type="submit"]');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData(form);
    formData.append("access_key", "171ab78c-bea0-4390-b515-bd884dd3cf45");

    const originalText = submitBtn.textContent;

    submitBtn.textContent = "Sending...";
    submitBtn.disabled = true;

    try {
        const response = await fetch("https://api.web3forms.com/submit", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (response.ok) {
            alert("Success! Your message has been sent.");
            form.reset();
        } else {
            alert("Error: " + data.message);
        }

    } catch (error) {
        alert("Something went wrong. Please try again.");
    } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
    }
});
    </script>
