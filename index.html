<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minhaju-L-Mubarak-TV</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    padding:20px;
}

/* Main Container */
.container{
    width:900px;
    max-width:100%;
    min-height:550px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* Left Side */
.left{
    width:50%;
    background:linear-gradient(135deg,#001f3f,#005792);
    color:#fff;
    padding:60px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.left h1{
    font-size:38px;
    margin-bottom:20px;
    line-height:1.3;
}

.left p{
    font-size:15px;
    opacity:0.9;
    line-height:1.8;
}

/* Right Side */
.right{
    width:50%;
    padding:40px;
    position:relative;
    overflow:hidden;
}

/* Form Titles */
.form-title{
    text-align:center;
    margin-bottom:30px;
}

.form-title h2{
    color:#001f3f;
    font-size:30px;
}

/* Input */
.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    margin-bottom: 12px;
    padding:14px;
    border:none;
    outline:none;
    background:#f1f1f1;
    border-radius:10px;
    font-size:15px;
}

.input-box input:focus{
    border:2px solid #005792;
}

/* Button */
.button{
    width:100%;
    padding:14px;
    margin-left: 150px;
    border:none;
    border-radius:10px;
    background:#005792;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.button:hover{
    background:#001f3f;
    transform:scale(1.02);
}

/* Switch Text */
.switch{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.switch a{
    color:#005792;
    font-weight:600;
    text-decoration:none;
}

/* Hide Signup Initially */
.signup-form{
    display:none;
}

/* Toggle Effect */
#toggle:checked ~ .right .login-form{
    display:none;
}

#toggle:checked ~ .right .signup-form{
    display:block;
}

#toggle{
    display:none;
}

/* Responsive */
@media(max-width:768px){

    .container{
        flex-direction:column;
    }

    .left,
    .right{
        width:100%;
    }

    .left{
        padding:40px 20px;
    }
    .button{
        margin-left: 200px;
    }

    .left h1{
        font-size:28px;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">
        <h1>Welcome to Minhaju-L-Mubarak-TV</h1>
        <p>
            Join our community today and stay connected with inspiring Islamic programs,
            lectures, live events, and spiritual enlightenment.
        </p>
    </div>

    <!-- Toggle Checkbox -->
    <input type="checkbox" id="toggle">

    <!-- Right Side -->
    <div class="right">

        <!-- Login Form -->
        <div class="login-form">

            <div class="form-title">
                <h2>Login</h2>
            </div>

            <form>

    <div class="input-box">
        <input type="email" placeholder="Email Address" required>
    </div>

    <div class="input-box">
        <input type="password" placeholder="Password" required>
    </div>
    <a href="index.html" class="button">Login</a>

    <div class="switch">
        Don't have an account?
        <a href="misign.html">Sign Up</a>
    </div>

</form>
            </form>

        </div>

        

    </div>
</div>

</body>
</html>
